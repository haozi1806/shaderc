name: Build Shaderc Shared Library for Android 15 (API 35)

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]  # 按需保留，可只留 arm64-v8a

    steps:
      - name: Checkout Shaderc source
        uses: actions/checkout@v4
        with:
          repository: google/shaderc
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----- 核心修复：使用固定版本 r27c + 伪装 User-Agent -----
      - name: Download and setup Android NDK
        run: |
          NDK_VERSION="r27c"
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          
          echo "Downloading NDK ${NDK_VERSION}..."
          wget --user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               --tries=3 \
               --timeout=30 \
               -O ndk.zip \
               ${NDK_URL}
          
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "$(pwd)/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
        # ---------------------------------------------------------

      - name: Configure CMake for ${{ matrix.abi }}
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADERC_BUILD_SHARED_LIBS=ON \
            -DSHADERC_SKIP_TESTS=ON \
            -DSPIRV_TOOLS_BUILD_STATIC=OFF

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: libshaderc-Android15-${{ matrix.abi }}
          path: build/libshaderc/libshaderc.so
