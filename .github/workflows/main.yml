name: Build Shaderc Shared Library for Android 15

on:
  workflow_dispatch:

env:
  NDK_VERSION: r27c  # ✅ 改动1：升级到 r27c，原生支持 API 35
  NDK_URL: https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - name: Checkout Shaderc source
        uses: actions/checkout@v4
        with:
          repository: google/shaderc
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download and setup Android NDK
        run: |
          wget -q ${NDK_URL} -O ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "$(pwd)/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Configure CMake for ${{ matrix.abi }}
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-35 \   # ✅ 改动2：24 → 35（对应 Android 15）
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADERC_BUILD_SHARED_LIBS=ON \
            -DSHADERC_SKIP_TESTS=ON \
            -DSPIRV_TOOLS_BUILD_STATIC=OFF

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: libshaderc-Android15-${{ matrix.abi }}
          path: build/libshaderc/libshaderc.so
